<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="হ্যালো বাংলাদেশী - গ্রুপ পেজ">
<title>গ্রুপ - হ্যালো বাংলাদেশী</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<style>
:root{
  --P:#006A4E;--PD:#00563D;--PL:#008060;--S:#F42A41;--SL:#FF5C72;
  --gold:#FFD700;--green:#27AE60;--blue:#3498DB;--orange:#F39C12;--red:#E74C3C;
  --td:#1A1A1A;--tm:#4A5568;--tl:#718096;
  --bg:#F7FAFC;--wh:#FFFFFF;--bd:#E2E8F0;
  --gP:linear-gradient(135deg,#006A4E,#008060);
  --gS:linear-gradient(135deg,#F42A41,#FF5C72);
  --gG:linear-gradient(135deg,#27AE60,#2ECC71);
  --gB:linear-gradient(135deg,#3498DB,#2E86C1);
  --bn:'Hind Siliguri',sans-serif;--dp:'Poppins',sans-serif;
  --s1:0 2px 8px rgba(0,106,78,.08);--s2:0 6px 16px rgba(0,106,78,.1);
  --s3:0 12px 32px rgba(0,106,78,.12);--s4:0 20px 40px rgba(0,0,0,.15);
  --r1:10px;--r2:16px;--r3:24px;--r4:32px;--rf:9999px;
  --tr:.3s ease;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--bn);background:var(--bg);color:var(--td);line-height:1.7}
.hidden{display:none!important}
img{max-width:100%}
a{text-decoration:none;color:inherit}
.flex{display:flex}.fca{display:flex;align-items:center}.fcb{display:flex;align-items:center;justify-content:space-between}
.tc{text-align:center}
.mt1{margin-top:6px}.mt2{margin-top:12px}.mt3{margin-top:20px}.mt4{margin-top:30px}
.mb2{margin-bottom:12px}.mb3{margin-bottom:20px}
.w100{width:100%}
.btn{padding:9px 16px;border:none;border-radius:var(--r2);font-weight:600;font-size:12px;cursor:pointer;transition:all var(--tr);display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:var(--bn)}
.btn-p{background:var(--gP);color:#fff;box-shadow:var(--s1)}.btn-p:hover{transform:translateY(-2px);box-shadow:var(--s3)}
.btn-s{background:var(--bg);color:var(--td);border:1px solid var(--bd)}.btn-s:hover{background:#fff;border-color:var(--P);color:var(--P)}
.btn-o{background:transparent;color:var(--P);border:2px solid var(--P)}.btn-o:hover{background:var(--P);color:#fff}
.btn-r{background:var(--gS);color:#fff}
.btn-g{background:var(--gG);color:#fff}
.bsm{padding:7px 12px;font-size:11px}
.bblock{width:100%}
.badge{display:inline-block;padding:3px 10px;border-radius:var(--rf);font-size:11px;font-weight:700;background:var(--P);color:#fff}
.badge-s{background:var(--S)}.badge-g{background:var(--green)}.badge-o{background:var(--orange)}

/* ===HEADER=== */
header{background:#fff;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:300;box-shadow:var(--s1)}
.navbar{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;max-width:1400px;margin:0 auto;gap:12px}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:19px;color:var(--P);cursor:pointer;white-space:nowrap}
.logo-icon{width:40px;height:40px;background:var(--gP);border-radius:var(--r2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;box-shadow:var(--s1);flex-shrink:0}
.nav-center{display:flex;gap:2px;flex:1;justify-content:center}
.nav-link{color:var(--tm);font-weight:500;font-size:13px;padding:8px 13px;border-radius:var(--rf);transition:all var(--tr);cursor:pointer;position:relative;white-space:nowrap}
.nav-link:hover{color:var(--P);background:rgba(0,106,78,.08)}
.nav-link.active{color:var(--P);background:rgba(0,106,78,.1);font-weight:600}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.dl-btn{background:var(--gP);padding:7px 13px;border-radius:var(--rf);color:#fff;display:flex;align-items:center;gap:6px;font-weight:500;transition:all var(--tr);border:none;cursor:pointer;font-size:12px;white-space:nowrap}
.dl-btn:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,106,78,.3)}
.bicon{width:36px;height:36px;border-radius:50%;border:none;background:var(--bg);color:var(--tm);font-size:15px;cursor:pointer;transition:all var(--tr);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bicon:hover{background:var(--P);color:#fff}
.umenu-wrap{position:relative}
.umenu{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:var(--rf);cursor:pointer;transition:all var(--tr)}
.umenu:hover{background:var(--bg)}
.uavatar{width:34px;height:34px;border-radius:50%;background:var(--gP);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px;flex-shrink:0}
.uname{font-weight:500;font-size:12px;color:var(--td);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.udrop{position:absolute;top:calc(100%+6px);right:0;background:#fff;border-radius:var(--r2);box-shadow:var(--s3);min-width:200px;overflow:hidden;z-index:400;display:none;border:1px solid var(--bd)}
.udrop.on{display:block}
.udrop a,.udrop .ddbtn{display:flex;align-items:center;gap:9px;padding:10px 15px;color:var(--td);transition:all var(--tr);background:none;border:none;width:100%;cursor:pointer;font-size:12px;font-family:var(--bn);text-align:left}
.udrop a:hover,.udrop .ddbtn:hover{background:var(--bg);color:var(--P)}
.udrop hr{margin:4px 0;border:none;border-top:1px solid var(--bd)}

/* ===MAIN CONTENT=== */
.container{max-width:1200px;margin:0 auto;padding:20px}
.page-hdr{margin-bottom:24px}
.page-title{font-size:28px;font-weight:700;color:var(--td);margin-bottom:6px}
.page-sub{color:var(--tl);font-size:13px}

/* ===GROUPS LISTING=== */
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.gcard{background:#fff;border-radius:var(--r3);overflow:hidden;transition:all var(--tr);box-shadow:var(--s1);border:1px solid var(--bd);cursor:pointer}
.gcard:hover{transform:translateY(-5px);box-shadow:var(--s3);border-color:var(--P)}
.gbanner{height:85px;background:var(--gP);position:relative}
.gavicon{position:absolute;bottom:-26px;left:16px;width:58px;height:58px;background:#fff;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:var(--s2);border:3px solid #fff}
.gbody{padding:36px 16px 16px}
.gname{font-size:16px;font-weight:700;margin-bottom:5px;color:var(--td)}
.gcat{display:inline-block;padding:2px 9px;background:var(--bg);border-radius:var(--rf);font-size:10px;color:var(--P);margin-bottom:7px;border:1px solid rgba(0,106,78,.2)}
.gdesc{color:var(--tm);font-size:11px;line-height:1.5;margin-bottom:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.gstats{display:flex;gap:16px;padding:9px 0;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);margin-bottom:11px}
.gsv{font-size:14px;font-weight:700;color:var(--P)}
.gsl{font-size:10px;color:var(--tl)}
.bjoin{width:100%;padding:8px;border:2px solid var(--bd);border-radius:var(--r2);background:var(--bg);color:var(--P);font-weight:600;cursor:pointer;transition:all var(--tr);font-family:var(--bn);font-size:12px}
.bjoin:hover,.bjoin.on{background:var(--P);color:#fff;border-color:var(--P)}

/* ===MODAL=== */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(5px);z-index:1000;display:none;align-items:center;justify-content:center;padding:14px}
.modal.on{display:flex}
.mbox{background:#fff;border-radius:var(--r4);padding:32px;max-width:500px;width:100%;box-shadow:var(--s4);animation:slideUp .4s ease;position:relative;max-height:90vh;overflow-y:auto}
.mbox-lg{max-width:900px}
.mhdr{margin-bottom:22px;text-align:center}
.mtitle{font-size:22px;font-weight:700;color:var(--td);margin-bottom:5px}
.msub{color:var(--tl);font-size:13px}
.mclose{position:absolute;top:16px;right:16px;background:var(--bg);border:none;width:34px;height:34px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--tr);z-index:10}
.mclose:hover{background:var(--P);color:#fff;transform:rotate(90deg)}

/* ===FORMS=== */
.fg{margin-bottom:16px}
.flabel{display:block;margin-bottom:6px;font-weight:600;font-size:12px;color:var(--td)}
.finput{width:100%;padding:10px 13px;border:2px solid var(--bd);border-radius:var(--r2);font-family:var(--bn);font-size:13px;transition:all var(--tr);background:var(--bg)}
.finput:focus{outline:none;border-color:var(--P);box-shadow:0 0 0 3px rgba(0,106,78,.08);background:#fff}
.ftextarea{resize:vertical;min-height:95px;line-height:1.6}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:13px}

/* ===GROUP DETAIL=== */
.gdetail{display:none}
.gdetail.on{display:block}
.ghdr{background:var(--gP);color:#fff;padding:32px;border-radius:var(--r3);margin-bottom:24px;position:relative;overflow:hidden}
.ghdr::before{content:'';position:absolute;top:-30%;right:-10%;width:260px;height:260px;background:rgba(255,255,255,.07);border-radius:50%}
.gicon-lg{font-size:56px;display:block;margin-bottom:12px;position:relative;z-index:1}
.gd-name{font-size:28px;font-weight:700;margin-bottom:6px;position:relative;z-index:1}
.gd-cat{font-size:13px;opacity:.9;margin-bottom:12px;position:relative;z-index:1}
.gd-stats{display:flex;gap:32px;margin-top:16px;position:relative;z-index:1}
.gds{font-size:18px;font-weight:700}.gdsl{font-size:10px;opacity:.8}
.gd-actions{display:flex;gap:8px;margin-top:16px;position:relative;z-index:1}
.gd-actions .btn{font-size:11px;padding:8px 14px}

.gtabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--bd)}
.gtab{padding:12px 18px;background:none;border:none;color:var(--tm);font-weight:600;cursor:pointer;transition:all var(--tr);font-family:var(--bn);font-size:13px;position:relative;border-bottom:3px solid transparent}
.gtab:hover{color:var(--P)}
.gtab.active{color:var(--P);border-bottom-color:var(--P)}

.gd-content{display:grid;grid-template-columns:1fr 290px;gap:18px}
.gd-posts{background:#fff;border-radius:var(--r3);padding:20px;box-shadow:var(--s1);border:1px solid var(--bd)}

/* ===POST FORM=== */
.post-form{background:var(--bg);padding:16px;border-radius:var(--r2);margin-bottom:20px;border:1px solid var(--bd)}
.pf-hdr{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.pf-av{width:40px;height:40px;border-radius:50%;background:var(--gB);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;flex-shrink:0}
.pf-inp{flex:1;padding:10px 13px;border:2px solid var(--bd);border-radius:var(--rf);font-family:var(--bn);font-size:13px;background:#fff;transition:all var(--tr);cursor:pointer}
.pf-inp:focus{outline:none;border-color:var(--P);box-shadow:0 0 0 3px rgba(0,106,78,.08)}
.pf-actions{display:flex;gap:6px;padding-top:12px;border-top:1px solid var(--bd)}
.pf-actions .btn{flex:1;font-size:11px;padding:7px}

/* ===POSTS=== */
.post{background:#fff;border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:14px;transition:all var(--tr)}
.post:hover{box-shadow:var(--s2);border-color:var(--P)}
.post-hdr{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.post-av{width:40px;height:40px;border-radius:50%;background:var(--gB);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;flex-shrink:0;font-size:14px}
.post-info h4{font-weight:600;font-size:13px;color:var(--td);margin-bottom:2px}
.post-info p{font-size:10px;color:var(--tl)}
.post-menu{margin-left:auto;position:relative}
.post-menu-btn{background:none;border:none;color:var(--tl);font-size:16px;cursor:pointer;padding:4px;transition:all var(--tr)}
.post-menu-btn:hover{color:var(--P)}
.post-dropdown{position:absolute;right:0;top:100%;background:#fff;border:1px solid var(--bd);border-radius:var(--r2);box-shadow:var(--s3);min-width:150px;display:none;z-index:100}
.post-dropdown.on{display:block}
.post-dropdown a{display:block;padding:10px 14px;color:var(--td);font-size:11px;transition:all var(--tr);cursor:pointer;border-bottom:1px solid var(--bd)}
.post-dropdown a:last-child{border-bottom:none}
.post-dropdown a:hover{background:var(--bg);color:var(--P)}

.post-content{margin-bottom:12px;color:var(--td);font-size:13px;line-height:1.6}
.post-stats{display:flex;gap:14px;padding:10px 0;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);margin-bottom:12px;font-size:12px;color:var(--tl)}
.post-acts{display:flex;gap:4px;justify-content:space-around}
.post-act-btn{flex:1;padding:7px;border:none;background:none;color:var(--tm);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;border-radius:var(--r1);transition:all var(--tr);font-family:var(--bn)}
.post-act-btn:hover{background:var(--bg);color:var(--P)}
.post-act-btn.liked{color:var(--S)}

/* ===COMMENTS=== */
.comments-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--bd)}
.comment{display:flex;gap:8px;margin-bottom:10px}
.comment-av{width:32px;height:32px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;font-size:12px}
.comment-content{flex:1}
.comment-hdr{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.comment-name{font-weight:600;font-size:11px;color:var(--td)}
.comment-time{font-size:9px;color:var(--tl)}
.comment-text{font-size:11px;color:var(--tm);line-height:1.5}

.comment-form{display:flex;gap:6px;padding-top:10px;border-top:1px solid var(--bd)}
.comment-inp{flex:1;padding:7px 10px;border:1px solid var(--bd);border-radius:var(--rf);font-family:var(--bn);font-size:11px;background:var(--bg)}
.comment-inp:focus{outline:none;border-color:var(--P)}
.comment-submit{background:none;border:none;color:var(--P);font-size:14px;cursor:pointer;padding:0 4px}

/* ===MEMBERS=== */
.members-panel{background:#fff;border-radius:var(--r3);padding:16px;box-shadow:var(--s1);border:1px solid var(--bd)}
.members-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--td);padding-bottom:8px;border-bottom:1px solid var(--bd)}
.member-item{display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:6px;background:var(--bg);border-radius:var(--r2);transition:all var(--tr)}
.member-item:hover{background:#fff;border:1px solid var(--bd)}
.member-av{width:32px;height:32px;border-radius:50%;background:var(--gP);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:12px;flex-shrink:0}
.member-name{flex:1;font-size:11px;font-weight:500;color:var(--td)}

/* ===EMPTY=== */
.empty{text-align:center;padding:44px 16px;color:var(--tl)}
.emico{font-size:60px;margin-bottom:16px;opacity:.35}
.empty h3{font-size:19px;font-weight:700;margin-bottom:9px;color:var(--td)}
.empty p{font-size:13px;max-width:300px;margin:0 auto}

/* ===TOAST=== */
.toasts{position:fixed;bottom:18px;right:18px;z-index:1100;display:flex;flex-direction:column;gap:7px}
.toast{background:#fff;padding:11px 16px;border-radius:var(--r3);box-shadow:var(--s4);min-width:250px;border-left:5px solid var(--P);display:flex;align-items:center;gap:9px;animation:slideIn .3s ease;border:1px solid var(--bd)}
.toast.s{border-left-color:var(--green)}.toast.e{border-left-color:var(--red)}.toast.w{border-left-color:var(--orange)}.toast.i{border-left-color:var(--blue)}
.tico{font-size:18px}.tcont{flex:1}
.ttitle{font-weight:600;margin-bottom:1px;color:var(--td);font-size:12px}
.tmsg{font-size:11px;color:var(--tm)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  .navbar{padding:9px 13px;flex-wrap:wrap}
  .nav-center{display:none}
  .container{padding:12px}
  .ggrid{grid-template-columns:1fr}
  .gd-content{grid-template-columns:1fr}
  .mbox{padding:20px;max-width:calc(100% - 28px)}
  .page-title{font-size:22px}
  .frow{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="navbar">
    <div class="logo">
      <div class="logo-icon">হেবি</div>
      <span style="font-weight:700">হ্যালো বাংলাদেশী - গ্রুপ</span>
    </div>
    <nav class="nav-center">
      <span class="nav-link"><i class="fas fa-home"></i> হোম</span>
      <span class="nav-link active"><i class="fas fa-users"></i> গ্রুপ</span>
    </nav>
    <div class="nav-right">
      <button class="bicon" onclick="G.showNotif()"><i class="fas fa-bell"></i></button>
      <div class="umenu-wrap">
        <div class="umenu" onclick="G.toggleUD()">
          <div class="uavatar" id="uAvatar">U</div>
          <span class="uname" id="uName">অতিথি</span>
          <i class="fas fa-chevron-down" style="font-size:9px;color:var(--tl)"></i>
        </div>
        <div id="udrop" class="udrop">
          <a onclick="G.go('profile');G.closeUD()"><i class="fas fa-user"></i> প্রোফাইল</a>
          <a onclick="G.go('settings');G.closeUD()"><i class="fas fa-cog"></i> সেটিংস</a>
          <hr>
          <button class="ddbtn" onclick="G.logout();G.closeUD()" style="color:var(--red)"><i class="fas fa-sign-out-alt"></i> লগ আউট</button>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- MAIN CONTENT -->
<div class="container">
  
  <!-- GROUPS LISTING VIEW -->
  <div id="vGroupsList" class="gdetail on">
    <div class="page-hdr">
      <div class="fcb" style="flex-wrap:wrap;gap:12px;margin-bottom:14px">
        <div>
          <h1 class="page-title">গ্রুপ</h1>
          <p class="page-sub">আপনার আগ্রহের গ্রুপে যোগ দিন এবং সংযুক্ত থাকুন</p>
        </div>
        <button class="btn btn-p" onclick="G.showCreateGroup()"><i class="fas fa-plus"></i> নতুন গ্রুপ</button>
      </div>
    </div>
    <div id="groupsList" class="ggrid"></div>
  </div>

  <!-- GROUP DETAIL VIEW -->
  <div id="vGroupDetail" class="gdetail">
    <button class="btn btn-s mb3" onclick="G.backToList()"><i class="fas fa-arrow-left"></i> ফিরে যান</button>
    
    <div id="groupHeader"></div>
    
    <div class="gtabs">
      <button class="gtab active" onclick="G.switchTab('posts',this)"><i class="fas fa-file-alt"></i> পোস্ট</button>
      <button class="gtab" onclick="G.switchTab('members',this)"><i class="fas fa-users"></i> সদস্য</button>
      <button class="gtab" onclick="G.switchTab('about',this)"><i class="fas fa-info-circle"></i> তথ্য</button>
    </div>

    <div id="postsTab" class="tab-content">
      <div class="gd-content">
        <div class="gd-posts">
          <div id="postForm"></div>
          <div id="postsList"></div>
        </div>
        <div id="membersSidebar"></div>
      </div>
    </div>

    <div id="membersTab" class="tab-content hidden">
      <div class="members-panel">
        <div class="members-title">সদস্য তালিকা</div>
        <div id="membersList"></div>
      </div>
    </div>

    <div id="aboutTab" class="tab-content hidden">
      <div style="background:#fff;padding:20px;border-radius:var(--r3);box-shadow:var(--s1);border:1px solid var(--bd)">

<!-- TOAST CONTAINER -->
<div class="toasts" id="toasts"></div>

<script>
// =================== FIREBASE ===================
const fbCfg={apiKey:"AIzaSyDpY4y-miVjE7P4sa2XxoG596LLRWcQ61w",authDomain:"hello-bangladeshi.firebaseapp.com",projectId:"hello-bangladeshi",storageBucket:"hello-bangladeshi.firebasestorage.app",messagingSenderId:"508048583569",appId:"1:508048583569:web:36eb40ac37d1682ca98830"};
firebase.initializeApp(fbCfg);
const auth=firebase.auth(),db=firebase.firestore();

// =================== APP ===================
const G={
 cu:null,cgid:null,cg:null,

 init(){
  auth.onAuthStateChanged(u=>{
   this.cu=u;
   if(u){this.updateUILogin(u);}else{this.updateUIGuest();}
   this.loadGroups();
  });
  window.addEventListener('click',e=>{if(!e.target.closest('.umenu-wrap'))this.closeUD();});
 },

 updateUILogin(u){
  const n=u.displayName||u.email||'ব্যবহারকারী';
  document.getElementById('uAvatar').textContent=n.charAt(0).toUpperCase();
  document.getElementById('uName').textContent=n.split('@')[0].slice(0,14);
 },

 updateUIGuest(){
  document.getElementById('uAvatar').textContent='U';
  document.getElementById('uName').textContent='অতিথি';
 },

 // ---- GROUPS ----
 loadGroups(){
  db.collection('groups').orderBy('createdAt','desc').onSnapshot(snap=>{
   const groups=[];
   snap.forEach(doc=>{
    const d=doc.data();
    groups.push({id:doc.id,...d,members:d.members||0,posts:d.posts||0});
   });
   this.renderGroups(groups);
  },err=>console.error('গ্রুপ লোড ত্রুটি:',err));
 },

 renderGroups(groups){
  const c=document.getElementById('groupsList');
  if(!groups.length){
   c.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="emico">👥</div><h3>কোন গ্রুপ নেই</h3><p>প্রথম গ্রুপ তৈরি করুন বা অন্যদের গ্রুপে যোগ দিন</p></div>';
   return;
  }
  c.innerHTML=groups.map(g=>`
   <div class="gcard" onclick="G.openGroup('${g.id}')">
    <div class="gbanner"><div class="gavicon">${g.icon||'👥'}</div></div>
    <div class="gbody">
     <div class="gname">${G.escape(g.name)}</div>
     <span class="gcat">${G.escape(g.category)}</span>
     <div class="gdesc">${G.escape(g.desc)}</div>
     <div class="gstats">
      <div><div class="gsv">${g.members}</div><div class="gsl">সদস্য</div></div>
      <div><div class="gsv">${g.posts}</div><div class="gsl">পোস্ট</div></div>
     </div>
     <button class="bjoin ${g.joined?'on':''}" onclick="event.stopPropagation();G.toggleGroup('${g.id}',this,${g.joined})">${g.joined?'যুক্ত হয়েছেন ✓':'যোগ দিন'}</button>
    </div>
   </div>`).join('');
 },

 openGroup(gid){
  this.cgid=gid;
  db.collection('groups').doc(gid).get().then(doc=>{
   if(!doc.exists){this.toast('গ্রুপ পাওয়া যায়নি','e');return;}
   this.cg=doc.data();
   document.getElementById('vGroupsList').classList.remove('on');
   document.getElementById('vGroupDetail').classList.add('on');
   this.renderGroupHeader();
   this.loadPosts();
   this.loadMembers();
  });
 },

 renderGroupHeader(){
  if(!this.cg)return;
  const html=`
   <div class="ghdr">
    <span class="gicon-lg">${this.cg.icon||'👥'}</span>
    <div class="gd-name">${G.escape(this.cg.name)}</div>
    <div class="gd-cat">${G.escape(this.cg.category)}</div>
    <div class="gd-stats">
     <div><span class="gds">${this.cg.members||0}</span><span class="gdsl">সদস্য</span></div>
     <div><span class="gds">${this.cg.posts||0}</span><span class="gdsl">পোস্ট</span></div>
    </div>
    <div class="gd-actions">
     <button class="btn ${this.cg.joined?'btn-s':'btn-p'}" onclick="G.toggleGroup('${this.cgid}',this,${this.cg.joined})"><i class="fas ${this.cg.joined?'fa-check':'fa-user-plus'}"></i> ${this.cg.joined?'যুক্ত হয়েছেন':'যোগ দিন'}</button>
     <button class="btn btn-s" onclick="G.shareGroup()"><i class="fas fa-share-alt"></i> শেয়ার</button>
    </div>
   </div>`;
  document.getElementById('groupHeader').innerHTML=html;
  document.getElementById('groupDesc').textContent=this.cg.desc||'কোন বিবরণ নেই';
  document.getElementById('statsMembers').textContent=this.cg.members||0;
  document.getElementById('statsPosts').textContent=this.cg.posts||0;
  document.getElementById('statsCreated').textContent=this.cg.createdAt?new Date(this.cg.createdAt.toDate()).toLocaleDateString('bn-BD'):'-';
 },

 toggleGroup(gid,btn,joined){
  if(!this.cu){this.toast('যোগ দিতে লগইন করুন','i');return;}
  const uid=this.cu.uid;
  if(joined){
   db.collection('groups').doc(gid).update({
    members:firebase.firestore.FieldValue.increment(-1),
    [`membersList.${uid}`]:firebase.firestore.FieldValue.delete()
   }).then(()=>{
    if(btn)btn.textContent='যোগ দিন';
    if(this.cg)this.cg.joined=false;
    this.toast('গ্রুপ থেকে বেরিয়ে গেছেন','s');
   });
  } else {
   db.collection('groups').doc(gid).update({
    members:firebase.firestore.FieldValue.increment(1),
    [`membersList.${uid}`]:firebase.firestore.FieldValue.serverTimestamp()
   }).then(()=>{
    if(btn)btn.textContent='যুক্ত হয়েছেন ✓';
    if(this.cg)this.cg.joined=true;
    this.toast('গ্রুপে যুক্ত হয়েছেন!','s');
   });
  }
 },

 shareGroup(){this.toast('গ্রুপ শেয়ার লিংক কপি করা হয়েছে','s');},

 backToList(){
  document.getElementById('vGroupDetail').classList.remove('on');
  document.getElementById('vGroupsList').classList.add('on');
  this.cgid=null;
  this.cg=null;
 },

 // ---- POSTS ----
 loadPosts(){
  if(!this.cgid)return;
  db.collection('groups').doc(this.cgid).collection('posts').orderBy('createdAt','desc').onSnapshot(snap=>{
   const posts=[];
   snap.forEach(doc=>{
    posts.push({id:doc.id,...doc.data()});
   });
   this.renderPostForm();
   this.renderPosts(posts);
  });
 },

 renderPostForm(){
  if(!this.cu||!this.cg?.joined){
   document.getElementById('postForm').innerHTML='';
   return;
  }
  const uname=this.cu.displayName||'ব্যবহারকারী';
  const av=uname.charAt(0).toUpperCase();
  const html=`
   <div class="post-form">
    <div class="pf-hdr">
     <div class="pf-av">${av}</div>
     <input type="text" id="postInp" class="pf-inp" placeholder="গ্রুপে কিছু শেয়ার করুন..." onclick="G.focusPost()">
    </div>
    <div id="postBody" style="display:none;margin-bottom:12px">
     <textarea id="postText" class="finput ftextarea" placeholder="আপনার মনের কথা লিখুন..." style="margin-bottom:10px"></textarea>
    </div>
    <div class="pf-actions" id="postActions" style="display:none">
     <button class="btn btn-p" style="flex:1" onclick="G.submitPost()"><i class="fas fa-paper-plane"></i> পোস্ট করুন</button>
     <button class="btn btn-s" style="flex:1" onclick="G.cancelPost()"><i class="fas fa-times"></i> বাতিল</button>
    </div>
   </div>`;
  document.getElementById('postForm').innerHTML=html;
 },

 focusPost(){
  document.getElementById('postBody').style.display='block';
  document.getElementById('postActions').style.display='flex';
  document.getElementById('postText').focus();
 },

 cancelPost(){
  document.getElementById('postBody').style.display='none';
  document.getElementById('postActions').style.display='none';
  document.getElementById('postText').value='';
  document.getElementById('postInp').value='';
 },

 submitPost(){
  const txt=document.getElementById('postText')?.value.trim();
  if(!txt){this.toast('কিছু লিখুন','e');return;}
  if(!this.cu||!this.cgid)return;
  
  const post={
   text:txt,
   author:this.cu.displayName||'ব্যবহারকারী',
   uid:this.cu.uid,
   likes:0,
   comments:0,
   createdAt:firebase.firestore.FieldValue.serverTimestamp()
  };
  
  db.collection('groups').doc(this.cgid).collection('posts').add(post).then(()=>{
   db.collection('groups').doc(this.cgid).update({posts:firebase.firestore.FieldValue.increment(1)});
   this.cancelPost();
   this.toast('পোস্ট সফলভাবে শেয়ার করা হয়েছে!','s');
  }).catch(e=>{this.toast('পোস্ট করতে সমস্যা হয়েছে','e');console.error(e);});
 },

 renderPosts(posts){
  const c=document.getElementById('postsList');
  if(!posts.length){
   c.innerHTML='<div class="empty"><div class="emico">📝</div><h3>কোন পোস্ট নেই</h3><p>প্রথম পোস্ট লিখুন এবং সম্প্রদায়ের সাথে শেয়ার করুন</p></div>';
   return;
  }
  
  c.innerHTML=posts.map(p=>{
   const dt=p.createdAt?new Date(p.createdAt.toDate()).toLocaleDateString('bn-BD'):'এখনই';
   const av=p.author.charAt(0).toUpperCase();
   return`
    <div class="post">
     <div class="post-hdr">
      <div class="post-av">${av}</div>
      <div class="post-info">
       <h4>${G.escape(p.author)}</h4>
       <p>${dt}</p>
      </div>
      <div class="post-menu">
       <button class="post-menu-btn" onclick="this.nextElementSibling.classList.toggle('on')"><i class="fas fa-ellipsis-h"></i></button>
       <div class="post-dropdown">
        ${p.uid===this.cu?.uid?'<a onclick="G.deletePost(\\''+p.id+'\\')" style="color:var(--red)"><i class="fas fa-trash-alt"></i> মুছুন</a>':''}
        <a onclick="G.reportPost()"><i class="fas fa-flag"></i> রিপোর্ট করুন</a>
       </div>
      </div>
     </div>
     <div class="post-content">${G.escape(p.text)}</div>
     <div class="post-stats">
      <span id="like-${p.id}">${p.likes||0}</span> পছন্দ •
      <span>${p.comments||0}</span> মন্তব্য
     </div>
     <div class="post-acts">
      <button class="post-act-btn" id="likebtn-${p.id}" onclick="G.toggleLike('${p.id}',this)"><i class="far fa-thumbs-up"></i> পছন্দ</button>
      <button class="post-act-btn" onclick="G.focusComment('${p.id}')"><i class="far fa-comment"></i> মন্তব্য</button>
      <button class="post-act-btn"><i class="far fa-share-square"></i> শেয়ার</button>
     </div>
     <div class="comments-section">
      <div id="comments-${p.id}"></div>
      <div class="comment-form">
       <input type="text" class="comment-inp" id="cinp-${p.id}" placeholder="মন্তব্য লিখুন...">
       <button class="comment-submit" onclick="G.submitComment('${p.id}')"><i class="fas fa-paper-plane"></i></button>
      </div>
     </div>
    </div>`;
  }).join('');
  
  posts.forEach(p=>this.loadComments(p.id));
 },

 toggleLike(pid,btn){
  if(!this.cu){this.toast('লাইক করতে লগইন করুন','i');return;}
  const uid=this.cu.uid;
  
  db.collection('groups').doc(this.cgid).collection('posts').doc(pid).collection('likes').doc(uid).get().then(doc=>{
   if(doc.exists){
    db.collection('groups').doc(this.cgid).collection('posts').doc(pid).collection('likes').doc(uid).delete();
    db.collection('groups').doc(this.cgid).collection('posts').doc(pid).update({likes:firebase.firestore.FieldValue.increment(-1)});
    btn.classList.remove('liked');
   } else {
    db.collection('groups').doc(this.cgid).collection('posts').doc(pid).collection('likes').doc(uid).set({likedAt:firebase.firestore.FieldValue.serverTimestamp()});
    db.collection('groups').doc(this.cgid).collection('posts').doc(pid).update({likes:firebase.firestore.FieldValue.increment(1)});
    btn.classList.add('liked');
   }
  });
 },

 focusComment(pid){
  document.getElementById('cinp-'+pid).focus();
 },

 submitComment(pid){
  const inp=document.getElementById('cinp-'+pid);
  const txt=inp?.value.trim();
  if(!txt){this.toast('কিছু লিখুন','e');return;}
  if(!this.cu||!this.cgid)return;
  
  const comment={
   text:txt,
   author:this.cu.displayName||'ব্যবহারকারী',
   uid:this.cu.uid,
   createdAt:firebase.firestore.FieldValue.serverTimestamp()
  };
  
  db.collection('groups').doc(this.cgid).collection('posts').doc(pid).collection('comments').add(comment).then(()=>{
   db.collection('groups').doc(this.cgid).collection('posts').doc(pid).update({comments:firebase.firestore.FieldValue.increment(1)});
   inp.value='';
   this.loadComments(pid);
  });
 },

 loadComments(pid){
  db.collection('groups').doc(this.cgid).collection('posts').doc(pid).collection('comments').orderBy('createdAt','asc').onSnapshot(snap=>{
   const comments=[];
   snap.forEach(doc=>{
    comments.push({id:doc.id,...doc.data()});
   });
   this.renderComments(pid,comments);
  });
 },

 renderComments(pid,comments){
  const c=document.getElementById('comments-'+pid);
  if(!comments.length){c.innerHTML='';return;}
  c.innerHTML=comments.map(cm=>{
   const dt=cm.createdAt?new Date(cm.createdAt.toDate()).toLocaleTimeString('bn-BD',{hour:'2-digit',minute:'2-digit'}):'এখনই';
   const av=cm.author.charAt(0).toUpperCase();
   return`
    <div class="comment">
     <div class="comment-av">${av}</div>
     <div class="comment-content">
      <div class="comment-hdr">
       <span class="comment-name">${G.escape(cm.author)}</span>
       <span class="comment-time">${dt}</span>
      </div>
      <div class="comment-text">${G.escape(cm.text)}</div>
     </div>
    </div>`;
  }).join('');
 },

 deletePost(pid){
  if(confirm('এই পোস্টটি মুছে ফেলবেন?')){
   db.collection('groups').doc(this.cgid).collection('posts').doc(pid).delete().then(()=>{
    db.collection('groups').doc(this.cgid).update({posts:firebase.firestore.FieldValue.increment(-1)});
    this.toast('পোস্ট মুছে ফেলা হয়েছে','s');
   });
  }
 },

 reportPost(){this.toast('পোস্ট রিপোর্ট হয়েছে। আমরা পর্যালোচনা করব','s');},

 // ---- MEMBERS ----
 loadMembers(){
  if(!this.cgid)return;
  db.collection('groups').doc(this.cgid).collection('members').orderBy('joinedAt','desc').limit(10).onSnapshot(snap=>{
   const members=[];
   snap.forEach(doc=>{
    members.push({id:doc.id,...doc.data()});
   });
   this.renderMembers(members);
  });
 },

 renderMembers(members){
  const c=document.getElementById('membersList');
  if(!members.length){
   c.innerHTML='<div class="empty"><div class="emico">👥</div><h3>কোন সদস্য নেই</h3></div>';
   return;
  }
  
  const html=members.map(m=>{
   const av=(m.name||'ব্যবহারকারী').charAt(0).toUpperCase();
   return`
    <div class="member-item">
     <div class="member-av">${av}</div>
     <div class="member-name">${G.escape(m.name||'ব্যবহারকারী')}</div>
    </div>`;
  }).join('');
  
  document.getElementById('membersSidebar').innerHTML=`
   <div class="members-panel">
    <div class="members-title">সদস্য</div>
    ${html}
   </div>`;
  
  const mlist=document.getElementById('membersList');
  mlist.innerHTML=html;
 },

 // ---- TABS ----
 switchTab(tab,el){
  document.querySelectorAll('.gtab').forEach(t=>t.classList.remove('active'));
  if(el)el.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('hidden'));
  
  const tabMap={'posts':'postsTab','members':'membersTab','about':'aboutTab'};
  const tabId=tabMap[tab];
  if(tabId)document.getElementById(tabId).classList.remove('hidden');
 },

 // ---- CREATE GROUP ----
 showCreateGroup(){
  if(!this.cu){this.toast('গ্রুপ তৈরি করতে লগইন করুন','i');return;}
  this.openM('mCreateGroup');
 },

 createGroup(){
  const nm=document.getElementById('cgName').value.trim();
  const cat=document.getElementById('cgCat').value;
  const desc=document.getElementById('cgDesc').value.trim();
  const ic=document.getElementById('cgIcon').value.trim();
  const priv=document.getElementById('cgPrivacy').value;
  
  if(!nm||!cat||!desc){this.toast('সব তথ্য পূরণ করুন','e');return;}
  if(!this.cu)return;
  
  const group={
   name:nm,
   category:cat,
   desc:desc,
   icon:ic||'👥',
   privacy:priv,
   creator:this.cu.uid,
   members:1,
   posts:0,
   createdAt:firebase.firestore.FieldValue.serverTimestamp(),
   membersList:{[this.cu.uid]:firebase.firestore.FieldValue.serverTimestamp()}
  };
  
  db.collection('groups').add(group).then(doc=>{
   db.collection('groups').doc(doc.id).collection('members').doc(this.cu.uid).set({name:this.cu.displayName||'ব্যবহারকারী',joinedAt:firebase.firestore.FieldValue.serverTimestamp()});
   this.closeM('mCreateGroup');
   ['cgName','cgCat','cgDesc','cgIcon'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
   document.getElementById('cgPrivacy').selectedIndex=0;
   this.toast('গ্রুপ সফলভাবে তৈরি হয়েছে!','s');
   this.loadGroups();
  }).catch(e=>{this.toast('গ্রুপ তৈরিতে সমস্যা','e');console.error(e);});
 },

 // ---- AUTH ----
 logout(){
  auth.signOut().then(()=>{
   this.cu=null;
   this.updateUIGuest();
   this.toast('লগ আউট হয়েছে','s');
  });
 },

 // ---- UI ----
 toggleUD(){document.getElementById('udrop').classList.toggle('on');},
 closeUD(){document.getElementById('udrop')?.classList.remove('on');},
 openM(id){const m=document.getElementById(id);if(m)m.classList.add('on');},
 closeM(id){const m=document.getElementById(id);if(m)m.classList.remove('on');},
 showNotif(){this.toast('নতুন বিজ্ঞপ্তি নেই','i');},

 escape(s){
  const div=document.createElement('div');
  div.textContent=s;
  return div.innerHTML;
 },

 toast(msg,tp='i'){
  const tc=document.getElementById('toasts'),id='t'+Date.now();
  const ic={s:'fas fa-check-circle',e:'fas fa-exclamation-circle',w:'fas fa-exclamation-triangle',i:'fas fa-info-circle'};
  const el=document.createElement('div');el.id=id;el.className=`toast ${tp}`;
  el.innerHTML=`<div class="tico"><i class="${ic[tp]||ic.i}"></i></div><div class="tcont"><div class="ttitle">${{s:'সফল',e:'ত্রুটি',w:'সতর্কতা',i:'তথ্য'}[tp]}</div><div class="tmsg">${msg}</div></div>`;
  tc.appendChild(el);
  setTimeout(()=>{const e=document.getElementById(id);if(e){e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(()=>e.remove(),300);}},5000);
 },
};

window.addEventListener('DOMContentLoaded',()=>G.init());
window.G=G;
</script>
