<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>গ্রুপ - হ্যালো বাংলাদেশী</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Hind Siliguri',sans-serif;background:#f7fafc}
.back{display:inline-flex;align-items:center;gap:9px;padding:10px 20px;background:white;color:#006A4E;border-radius:50px;font-weight:600;margin:18px;transition:all .3s;border:2px solid #006A4E;text-decoration:none;font-size:13px}
.back:hover{background:#006A4E;color:white;transform:translateX(-4px)}
.header{background:linear-gradient(135deg,#006A4E,#008060);color:white;padding:50px 20px;text-align:center}
.header h1{font-size:34px;margin-bottom:8px}.header p{font-size:15px;opacity:.9}
.container{max-width:1200px;margin:-26px auto 60px;padding:0 20px}
.topbar{background:white;border-radius:20px;padding:24px;margin-bottom:28px;box-shadow:0 5px 15px rgba(0,0,0,.06);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.topbar-info h3{font-size:18px;margin-bottom:4px;color:#1a1a1a}.topbar-info p{color:#718096;font-size:13px}
.btn-create{padding:10px 24px;background:linear-gradient(135deg,#006A4E,#008060);color:white;border:none;border-radius:50px;font-weight:600;cursor:pointer;font-family:inherit;font-size:13px;transition:all .3s}
.btn-create:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,106,78,.3)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:22px}
.gcard{background:white;border-radius:22px;overflow:hidden;transition:all .3s;box-shadow:0 5px 15px rgba(0,0,0,.05);border:1px solid #e2e8f0}
.gcard:hover{transform:translateY(-8px);box-shadow:0 20px 40px rgba(0,0,0,.1);border-color:#006A4E}
.gbanner{height:100px;background:linear-gradient(135deg,#006A4E,#008060);position:relative}
.gavicon{position:absolute;bottom:-28px;left:18px;width:60px;height:60px;background:white;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 5px 15px rgba(0,0,0,.1);border:3px solid white}
.gbody{padding:40px 18px 18px}
.gname{font-size:17px;font-weight:700;margin-bottom:5px;color:#1a1a1a}
.gcat{display:inline-block;padding:3px 11px;background:#f7fafc;border-radius:50px;font-size:11px;color:#006A4E;margin-bottom:9px;border:1px solid rgba(0,106,78,.2)}
.gdesc{color:#4a5568;font-size:12px;line-height:1.6;margin-bottom:13px}
.gstats{display:flex;gap:18px;padding:11px 0;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;margin-bottom:13px}
.gsv{font-size:16px;font-weight:700;color:#006A4E;display:block}.gsl{font-size:10px;color:#718096}
.bjoin{width:100%;padding:9px;border:2px solid #e2e8f0;border-radius:12px;background:#f7fafc;color:#006A4E;font-weight:600;cursor:pointer;transition:all .3s;font-family:inherit;font-size:13px}
.bjoin:hover,.bjoin.on{background:#006A4E;color:white;border-color:#006A4E}
@media(max-width:768px){.grid{grid-template-columns:1fr}.topbar{flex-direction:column;text-align:center}}
</style>
</head>
<body>
<a href="index.html" class="back"><i class="fas fa-arrow-left"></i> হোমে ফিরুন</a>
<div class="header"><h1 class="bangla">গ্রুপ</h1><p class="bangla">আপনার আগ্রহের গ্রুপে যোগ দিন</p></div>
<div class="container">
  <div class="topbar">
    <div class="topbar-info"><h3 class="bangla">সব গ্রুপ</h3><p class="bangla">আপনার পছন্দের গ্রুপ খুঁজে নিন</p></div>
    <button class="btn-create bangla" onclick="createGroup()"><i class="fas fa-plus"></i> নতুন গ্রুপ তৈরি করুন</button>
  </div>
  <div class="grid" id="groupsGrid"></div>
</div>
<script>
const groups=[
  {id:1,nm:'বাংলাদেশী শিক্ষার্থী',ct:'শিক্ষা',ds:'বাংলাদেশের বিভিন্ন শিক্ষাপ্রতিষ্ঠানের শিক্ষার্থীদের জন্য। পড়াশোনা, ক্যারিয়ার ও অভিজ্ঞতা শেয়ার করুন।',mb:1250,po:340,ic:'🎓',jn:false},
  {id:2,nm:'আইটি পেশাজীবী বাংলাদেশ',ct:'প্রযুক্তি',ds:'আইটি সেক্টরে কর্মরত বাংলাদেশীদের জন্য। নতুন টেকনোলজি, জব ও প্রজেক্ট নিয়ে আলোচনা।',mb:3420,po:890,ic:'💻',jn:true},
  {id:3,nm:'উদ্যোক্তা নেটওয়ার্ক BD',ct:'ব্যবসা',ds:'উদ্যোক্তা ও ব্যবসায়ীদের নেটওয়ার্ক। সুযোগ, অংশীদারিত্ব ও মার্কেটিং টিপস।',mb:2100,po:560,ic:'📈',jn:false},
  {id:4,nm:'প্রবাসী বাংলাদেশী',ct:'সম্প্রদায়',ds:'বিদেশে বসবাসরত বাংলাদেশীদের জন্য। অভিজ্ঞতা শেয়ার ও সমস্যার সমাধান।',mb:8900,po:2100,ic:'🌍',jn:false},
  {id:5,nm:'ফ্রিল্যান্সার কমিউনিটি',ct:'ক্যারিয়ার',ds:'ফ্রিল্যান্সারদের সম্পূর্ণ প্ল্যাটফর্ম। কাজের সুযোগ, ক্লায়েন্ট ম্যানেজমেন্ট ও স্কিল।',mb:4500,po:1250,ic:'💼',jn:true},
  {id:6,nm:'ক্রিয়েটিভ আর্টিস্ট',ct:'সৃজনশীলতা',ds:'শিল্পী, ডিজাইনার ও ক্রিয়েটিভ ব্যক্তিদের গ্রুপ। আর্ট ও ডিজাইন আইডিয়া শেয়ার।',mb:980,po:420,ic:'🎨',jn:false},
  {id:7,nm:'মৌলভীবাজার জেলা',ct:'স্থানীয়',ds:'মৌলভীবাজার জেলার মানুষদের জন্য। স্থানীয় খবর, ব্যবসা ও সামাজিক কার্যক্রম।',mb:2300,po:780,ic:'🏡',jn:false},
  {id:8,nm:'স্বাস্থ্য ও সুস্থতা',ct:'স্বাস্থ্য',ds:'সুস্বাস্থ্য বিষয়ক আলোচনা। ডাক্তার, নার্স ও স্বাস্থ্যকর্মীদের জন্য।',mb:1560,po:640,ic:'🏥',jn:false},
];
function render(){
  document.getElementById('groupsGrid').innerHTML=groups.map(g=>`
    <div class="gcard">
      <div class="gbanner"><div class="gavicon">${g.ic}</div></div>
      <div class="gbody">
        <div class="gname bangla">${g.nm}</div>
        <span class="gcat bangla">${g.ct}</span>
        <div class="gdesc bangla">${g.ds}</div>
        <div class="gstats"><div><span class="gsv">${g.mb.toLocaleString()}</span><span class="gsl bangla">সদস্য</span></div><div><span class="gsv">${g.po}</span><span class="gsl bangla">পোস্ট</span></div></div>
        <button class="bjoin bangla ${g.jn?'on':''}" onclick="toggle(${g.id})"><i class="fas ${g.jn?'fa-check':'fa-user-plus'}"></i> ${g.jn?'যুক্ত হয়েছেন ✓':'যোগ দিন'}</button>
      </div>
    </div>`).join('');
}
function toggle(id){
  const g=groups.find(x=>x.id===id);if(!g)return;
  g.jn=!g.jn;g.jn?g.mb++:g.mb--;
  render();alert(g.jn?`"${g.nm}" গ্রুপে যোগ দিয়েছেন!`:`"${g.nm}" গ্রুপ থেকে বের হয়ে গেছেন।`);
}
function createGroup(){alert('গ্রুপ তৈরির জন্য অনুগ্রহ করে লগইন করুন!');}
render();
</script>
</body>
</html>
