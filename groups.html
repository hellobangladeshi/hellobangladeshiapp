<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="হ্যালো বাংলাদেশী - রিয়েল-টাইম গ্রুপ সিস্টেম">
<title>হ্যালো বাংলাদেশী - গ্রুপ</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<style>
    /* ===== Base Styles ===== */
    :root {
        --P: #006A4E; --PD: #00563D; --PL: #008060; --S: #F42A41; --SL: #FF5C72;
        --gold: #FFD700; --green: #27AE60; --blue: #3498DB; --orange: #F39C12; --red: #E74C3C;
        --td: #1A1A1A; --tm: #4A5568; --tl: #718096;
        --bg: #F7FAFC; --wh: #FFFFFF; --bd: #E2E8F0;
        --gP: linear-gradient(135deg, #006A4E, #008060);
        --bn: 'Hind Siliguri', sans-serif;
        --s1: 0 2px 8px rgba(0,106,78,.08); --s2: 0 6px 16px rgba(0,106,78,.1);
        --s3: 0 12px 32px rgba(0,106,78,.12); --rf: 9999px;
        --tr: .3s ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--bn); }
    body { background: var(--bg); color: var(--td); line-height: 1.6; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    
    /* ===== Header ===== */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; background: var(--wh); padding: 15px 20px; border-radius: 16px; box-shadow: var(--s1); }
    .logo h1 { font-size: 24px; color: var(--P); display: flex; align-items: center; gap: 8px; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 40px; height: 40px; background: var(--gP); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
    .login-btn, .logout-btn { background: var(--P); color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: 600; }
    .create-group-btn { background: var(--gP); color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: var(--tr); }
    .create-group-btn:hover { transform: translateY(-2px); box-shadow: var(--s2); }
    
    /* ===== Groups Grid ===== */
    .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .group-card { background: var(--wh); border-radius: 20px; overflow: hidden; box-shadow: var(--s1); transition: var(--tr); cursor: pointer; border: 1px solid var(--bd); }
    .group-card:hover { transform: translateY(-5px); box-shadow: var(--s3); border-color: var(--P); }
    .group-banner { height: 100px; background: var(--gP); position: relative; }
    .group-icon { position: absolute; bottom: -25px; left: 20px; width: 60px; height: 60px; background: white; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: var(--s2); border: 3px solid white; }
    .group-info { padding: 35px 18px 18px; }
    .group-name { font-size: 18px; font-weight: 700; margin-bottom: 5px; color: var(--td); }
    .group-category { display: inline-block; background: var(--bg); padding: 3px 10px; border-radius: 20px; font-size: 11px; color: var(--P); margin-bottom: 8px; border: 1px solid rgba(0,106,78,.2); }
    .group-desc { font-size: 12px; color: var(--tm); margin-bottom: 12px; line-height: 1.5; }
    .group-stats { display: flex; gap: 20px; padding: 10px 0; border-top: 1px solid var(--bd); border-bottom: 1px solid var(--bd); margin-bottom: 12px; }
    .stat { text-align: center; flex: 1; }
    .stat-number { font-weight: 700; color: var(--P); font-size: 14px; }
    .stat-label { font-size: 10px; color: var(--tl); }
    .join-btn { width: 100%; padding: 8px; border: 2px solid var(--bd); border-radius: 30px; background: var(--bg); font-weight: 600; cursor: pointer; transition: var(--tr); font-size: 13px; }
    .join-btn.joined { background: var(--P); color: white; border-color: var(--P); }
    
    /* ===== Group Detail View ===== */
    .group-detail-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; overflow-y: auto; }
    .group-detail-container { background: var(--wh); border-radius: 24px; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--s3); animation: fadeInUp 0.3s ease; }
    .detail-header { background: var(--gP); padding: 25px; color: white; position: relative; border-radius: 24px 24px 0 0; }
    .detail-header h2 { font-size: 24px; margin-bottom: 5px; }
    .close-detail { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 18px; }
    .detail-content { padding: 20px; }
    .create-post { background: var(--bg); padding: 15px; border-radius: 16px; margin-bottom: 25px; border: 1px solid var(--bd); }
    .create-post textarea { width: 100%; border: 1px solid var(--bd); border-radius: 12px; padding: 12px; font-size: 13px; resize: vertical; margin-bottom: 10px; font-family: var(--bn); }
    .create-post button { background: var(--P); color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: 600; }
    .posts-list { display: flex; flex-direction: column; gap: 20px; }
    .post-card { background: var(--wh); border: 1px solid var(--bd); border-radius: 16px; padding: 15px; transition: var(--tr); }
    .post-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; color: var(--tl); }
    .post-content { font-size: 14px; margin-bottom: 15px; line-height: 1.6; }
    .post-actions { display: flex; gap: 15px; border-top: 1px solid var(--bd); padding-top: 12px; }
    .like-btn, .comment-btn { background: none; border: none; display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 13px; color: var(--tm); transition: var(--tr); }
    .like-btn.liked { color: var(--S); }
    .comments-section { margin-top: 15px; padding-left: 20px; border-left: 2px solid var(--bd); }
    .comment { background: var(--bg); padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; font-size: 12px; }
    .comment strong { color: var(--P); margin-right: 6px; }
    .add-comment { display: flex; gap: 8px; margin-top: 10px; }
    .add-comment input { flex: 1; padding: 8px 12px; border: 1px solid var(--bd); border-radius: 30px; font-size: 12px; }
    .add-comment button { background: var(--P); color: white; border: none; padding: 6px 15px; border-radius: 30px; cursor: pointer; }
    
    /* ===== Modal ===== */
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1100; }
    .modal-content { background: white; border-radius: 24px; width: 90%; max-width: 500px; padding: 25px; animation: fadeInUp 0.2s ease; }
    .modal-content input, .modal-content select, .modal-content textarea { width: 100%; padding: 10px; margin: 8px 0 15px; border: 1px solid var(--bd); border-radius: 12px; font-family: var(--bn); }
    .modal-content button { background: var(--P); color: white; border: none; padding: 10px; border-radius: 30px; cursor: pointer; width: 100%; font-weight: 600; margin-top: 10px; }
    .modal-close { float: right; font-size: 24px; cursor: pointer; }
    
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--td); color: white; padding: 12px 20px; border-radius: 40px; z-index: 1200; animation: fadeIn 0.3s; box-shadow: var(--s3); }
    .empty-state { text-align: center; padding: 40px; color: var(--tl); }
    .loading { text-align: center; padding: 40px; color: var(--P); }
    .hidden { display: none; }
    button { cursor: pointer; }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-users" style="color: var(--P);"></i> হ্যালো বাংলাদেশী <span style="font-size: 14px;">গ্রুপ</span></h1>
        </div>
        <div class="user-info" id="userInfo">
            <div id="authButtons">
                <button class="login-btn" onclick="showAuthModal()"><i class="fas fa-sign-in-alt"></i> লগইন</button>
            </div>
            <div id="userProfile" style="display: none;">
                <div class="user-avatar" id="userAvatar">U</div>
                <span id="userName"></span>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> লগআউট</button>
            </div>
        </div>
        <button class="create-group-btn" id="openCreateGroupBtn"><i class="fas fa-plus-circle"></i> নতুন গ্রুপ খুলুন</button>
    </div>
    <div id="groupsListContainer" class="groups-grid">
        <div class="loading"><i class="fas fa-spinner fa-spin"></i> গ্রুপ লোড হচ্ছে...</div>
    </div>
</div>

<!-- Create Group Modal -->
<div id="createGroupModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" id="closeModal">&times;</span>
        <h3 style="margin-bottom: 15px;">নতুন গ্রুপ তৈরি করুন</h3>
        <input type="text" id="groupName" placeholder="গ্রুপের নাম *">
        <select id="groupCategory">
            <option value="সাধারণ">সাধারণ</option>
            <option value="প্রযুক্তি">প্রযুক্তি</option>
            <option value="শিক্ষা">শিক্ষা</option>
            <option value="ব্যবসা">ব্যবসা</option>
            <option value="স্বাস্থ্য">স্বাস্থ্য</option>
            <option value="সৃজনশীলতা">সৃজনশীলতা</option>
        </select>
        <textarea id="groupDesc" rows="3" placeholder="গ্রুপের বিবরণ"></textarea>
        <input type="text" id="groupIcon" placeholder="আইকন (যেমন: 🚀, 💻, 🎓)" value="👥">
        <button id="confirmCreateGroup">গ্রুপ তৈরি করুন</button>
    </div>
</div>

<!-- Auth Modal -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" id="closeAuthModal">&times;</span>
        <h3 style="margin-bottom: 15px;">লগইন করুন</h3>
        <input type="email" id="loginEmail" placeholder="ইমেল">
        <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড">
        <button onclick="login()">লগইন</button>
        <hr style="margin: 15px 0;">
        <h4>নতুন অ্যাকাউন্ট তৈরি করুন</h4>
        <input type="text" id="signupName" placeholder="আপনার নাম">
        <input type="email" id="signupEmail" placeholder="ইমেল">
        <input type="password" id="signupPassword" placeholder="পাসওয়ার্ড (৬+ অক্ষর)">
        <button onclick="signup()">সাইন আপ</button>
    </div>
</div>

<!-- Group Detail Overlay -->
<div id="groupDetailOverlay" class="group-detail-overlay">
    <div class="group-detail-container">
        <div class="detail-header" id="detailHeader">
            <h2 id="detailGroupName">Group Name</h2>
            <p id="detailGroupDesc">Description</p>
            <button class="close-detail" id="closeDetailBtn">&times;</button>
        </div>
        <div class="detail-content">
            <div class="create-post">
                <textarea id="newPostContent" rows="2" placeholder="আপনার মনের কথা শেয়ার করুন..."></textarea>
                <button id="submitPostBtn">পোস্ট করুন</button>
            </div>
            <div id="postsListContainer" class="posts-list">
                <div class="loading">পোস্ট লোড হচ্ছে...</div>
            </div>
        </div>
    </div>
</div>

<script>
// Firebase Configuration
const firebaseConfig = {
    apiKey: "AIzaSyAGlMCGsQhz_XyQw7s0NZWrD4GXhHRNjww",
    authDomain: "hellobangladeshi.firebaseapp.com",
    databaseURL: "https://hellobangladeshi-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "hellobangladeshi",
    storageBucket: "hellobangladeshi.firebasestorage.app",
    messagingSenderId: "1068912456284",
    appId: "1:1068912456284:web:9dbe759a9352ff0a072c99",
    measurementId: "G-4FLDL5KPRL"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let currentGroupId = null;

// ========== Authentication Functions ==========
function showAuthModal() {
    document.getElementById('authModal').style.display = 'flex';
}

function closeAuthModal() {
    document.getElementById('authModal').style.display = 'none';
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('signupName').value = '';
    document.getElementById('signupEmail').value = '';
    document.getElementById('signupPassword').value = '';
}

async function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) {
        showToast('ইমেল এবং পাসওয়ার্ড দিন', 'error');
        return;
    }
    try {
        const result = await auth.signInWithEmailAndPassword(email, password);
        showToast('লগইন সফল!', 'success');
        closeAuthModal();
    } catch (error) {
        showToast(error.message, 'error');
    }
}

async function signup() {
    const name = document.getElementById('signupName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    if (!name || !email || !password) {
        showToast('সব তথ্য পূরণ করুন', 'error');
        return;
    }
    if (password.length < 6) {
        showToast('পাসওয়ার্ড ৬+ অক্ষর হতে হবে', 'error');
        return;
    }
    try {
        const result = await auth.createUserWithEmailAndPassword(email, password);
        await result.user.updateProfile({ displayName: name });
        await db.ref(`users/${result.user.uid}`).set({
            name: name,
            email: email,
            createdAt: Date.now()
        });
        showToast('অ্যাকাউন্ট তৈরি সফল!', 'success');
        closeAuthModal();
    } catch (error) {
        showToast(error.message, 'error');
    }
}

async function logout() {
    await auth.signOut();
    showToast('লগআউট হয়েছে', 'info');
}

// ========== Auth State Listener ==========
auth.onAuthStateChanged(async (user) => {
    if (user) {
        currentUser = {
            uid: user.uid,
            name: user.displayName || user.email.split('@')[0],
            email: user.email
        };
        document.getElementById('authButtons').style.display = 'none';
        document.getElementById('userProfile').style.display = 'flex';
        document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
        document.getElementById('userName').textContent = currentUser.name;
    } else {
        currentUser = null;
        document.getElementById('authButtons').style.display = 'flex';
        document.getElementById('userProfile').style.display = 'none';
    }
    loadGroups();
});

// ========== Groups Functions ==========
async function loadGroups() {
    const container = document.getElementById('groupsListContainer');
    container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> গ্রুপ লোড হচ্ছে...</div>';
    
    db.ref('groups').on('value', (snapshot) => {
        const groups = [];
        snapshot.forEach((child) => {
            const group = child.val();
            group.id = child.key;
            groups.push(group);
        });
        renderGroups(groups);
    });
}

function renderGroups(groups) {
    const container = document.getElementById('groupsListContainer');
    if (!groups.length) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-users-slash" style="font-size: 40px;"></i><p>কোন গ্রুপ নেই। প্রথম গ্রুপ তৈরি করুন!</p></div>';
        return;
    }
    
    container.innerHTML = groups.map(group => `
        <div class="group-card" data-group-id="${group.id}">
            <div class="group-banner">
                <div class="group-icon">${group.icon || '👥'}</div>
            </div>
            <div class="group-info">
                <div class="group-name">${escapeHtml(group.name)}</div>
                <span class="group-category">${group.category}</span>
                <div class="group-desc">${escapeHtml(group.description || 'কোন বিবরণ নেই')}</div>
                <div class="group-stats">
                    <div class="stat"><div class="stat-number">${group.members || 0}</div><div class="stat-label">সদস্য</div></div>
                    <div class="stat"><div class="stat-number">${group.postsCount || 0}</div><div class="stat-label">পোস্ট</div></div>
                </div>
                <button class="join-btn ${group.members && group.members[currentUser?.uid] ? 'joined' : ''}" data-group-id="${group.id}">
                    ${group.members && group.members[currentUser?.uid] ? '<i class="fas fa-check"></i> যুক্ত হয়েছেন' : '<i class="fas fa-user-plus"></i> যোগ দিন'}
                </button>
            </div>
        </div>
    `).join('');
    
    // Add event listeners
    document.querySelectorAll('.group-card').forEach(card => {
        card.addEventListener('click', (e) => {
            if (e.target.classList.contains('join-btn')) return;
            const groupId = card.getAttribute('data-group-id');
            openGroupDetail(groupId);
        });
    });
    
    document.querySelectorAll('.join-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!currentUser) {
                showToast('গ্রুপে যোগ দিতে লগইন করুন', 'error');
                showAuthModal();
                return;
            }
            const groupId = btn.getAttribute('data-group-id');
            await toggleJoinGroup(groupId);
        });
    });
}

async function toggleJoinGroup(groupId) {
    if (!currentUser) return;
    
    const groupRef = db.ref(`groups/${groupId}`);
    const groupSnapshot = await groupRef.once('value');
    const group = groupSnapshot.val();
    
    if (group.members && group.members[currentUser.uid]) {
        // Leave group
        await groupRef.child(`members/${currentUser.uid}`).remove();
        await groupRef.child('membersCount').transaction(count => (count || 1) - 1);
        showToast('গ্রুপ ছেড়েছেন', 'info');
    } else {
        // Join group
        await groupRef.child(`members/${currentUser.uid}`).set({
            name: currentUser.name,
            joinedAt: Date.now()
        });
        await groupRef.child('membersCount').transaction(count => (count || 0) + 1);
        showToast('গ্রুপে যোগ দিয়েছেন!', 'success');
    }
}

async function createGroup() {
    if (!currentUser) {
        showToast('গ্রুপ তৈরি করতে লগইন করুন', 'error');
        showAuthModal();
        return;
    }
    
    const name = document.getElementById('groupName').value.trim();
    const category = document.getElementById('groupCategory').value;
    const description = document.getElementById('groupDesc').value.trim();
    const icon = document.getElementById('groupIcon').value.trim() || '👥';
    
    if (!name) {
        showToast('গ্রুপের নাম লিখুন', 'error');
        return;
    }
    
    const newGroupRef = db.ref('groups').push();
    const groupData = {
        name: name,
        category: category,
        description: description || 'কোন বিবরণ নেই',
        icon: icon,
        createdBy: currentUser.uid,
        createdAt: Date.now(),
        membersCount: 1,
        postsCount: 0
    };
    
    groupData[`members/${currentUser.uid}`] = {
        name: currentUser.name,
        joinedAt: Date.now()
    };
    
    await newGroupRef.set(groupData);
    showToast(`"${name}" গ্রুপ তৈরি হয়েছে!`, 'success');
    closeCreateModal();
}

// ========== Posts Functions ==========
async function openGroupDetail(groupId) {
    if (!currentUser) {
        showToast('গ্রুপ দেখতে লগইন করুন', 'error');
        showAuthModal();
        return;
    }
    
    currentGroupId = groupId;
    const groupSnapshot = await db.ref(`groups/${groupId}`).once('value');
    const group = groupSnapshot.val();
    
    if (!group) {
        showToast('গ্রুপ পাওয়া যায়নি', 'error');
        return;
    }
    
    document.getElementById('detailGroupName').innerText = group.name;
    document.getElementById('detailGroupDesc').innerHTML = `<i class="fas fa-tag"></i> ${group.category} | <i class="fas fa-users"></i> ${group.membersCount || 0} সদস্য`;
    document.getElementById('groupDetailOverlay').style.display = 'flex';
    
    loadPosts(groupId);
}

function loadPosts(groupId) {
    const container = document.getElementById('postsListContainer');
    container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> পোস্ট লোড হচ্ছে...</div>';
    
    db.ref(`posts/${groupId}`).orderByChild('createdAt').on('value', (snapshot) => {
        const posts = [];
        snapshot.forEach((child) => {
            const post = child.val();
            post.id = child.key;
            posts.push(post);
        });
        renderPosts(posts.reverse());
    });
}

function renderPosts(posts) {
    const container = document.getElementById('postsListContainer');
    if (!posts.length) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-comment-slash"></i><p>কোন পোস্ট নেই। প্রথম পোস্ট করুন!</p></div>';
        return;
    }
    
    container.innerHTML = posts.map(post => `
        <div class="post-card" data-post-id="${post.id}">
            <div class="post-header">
                <span><strong>${escapeHtml(post.userName)}</strong> <span style="color: var(--tl);">${formatDate(post.createdAt)}</span></span>
            </div>
            <div class="post-content">${escapeHtml(post.content)}</div>
            <div class="post-actions">
                <button class="like-btn ${post.likes && post.likes[currentUser?.uid] ? 'liked' : ''}" onclick="toggleLike('${currentGroupId}', '${post.id}')">
                    <i class="fas fa-heart"></i> ${Object.keys(post.likes || {}).length} লাইক
                </button>
                <button class="comment-btn" onclick="toggleComments('${post.id}')">
                    <i class="fas fa-comment"></i> ${Object.keys(post.comments || {}).length} মন্তব্য
                </button>
            </div>
            <div class="comments-section" id="comments-${post.id}" style="display: none;">
                ${renderComments(post.comments)}
                <div class="add-comment">
                    <input type="text" id="commentInput-${post.id}" placeholder="মন্তব্য লিখুন...">
                    <button onclick="addComment('${currentGroupId}', '${post.id}')">পোস্ট</button>
                </div>
            </div>
        </div>
    `).join('');
}

function renderComments(comments) {
    if (!comments) return '';
    return Object.values(comments).map(comment => `
        <div class="comment">
            <strong>${escapeHtml(comment.userName)}:</strong> ${escapeHtml(comment.text)}
            <span style="font-size: 10px; color: var(--tl);">${formatDate(comment.createdAt)}</span>
        </div>
    `).join('');
}

async function createPost() {
    if (!currentUser) {
        showToast('পোস্ট করতে লগইন করুন', 'error');
        return;
    }
    
    const content = document.getElementById('newPostContent').value.trim();
    if (!content) {
        showToast('পোস্টের কন্টেন্ট লিখুন', 'error');
        return;
    }
    
    // Check if user is member
    const groupSnapshot = await db.ref(`groups/${currentGroupId}/members/${currentUser.uid}`).once('value');
    if (!groupSnapshot.exists()) {
        showToast('পোস্ট করতে গ্রুপে যোগ দিন!', 'error');
        return;
    }
    
    const newPostRef = db.ref(`posts/${currentGroupId}`).push();
    const postData = {
        userId: currentUser.uid,
        userName: currentUser.name,
        content: content,
        createdAt: Date.now(),
        likes: {},
        comments: {}
    };
    
    await newPostRef.set(postData);
    await db.ref(`groups/${currentGroupId}/postsCount`).transaction(count => (count || 0) + 1);
    
    document.getElementById('newPostContent').value = '';
    showToast('পোস্ট শেয়ার হয়েছে!', 'success');
}

async function toggleLike(groupId, postId) {
    if (!currentUser) {
        showToast('লাইক দিতে লগইন করুন', 'error');
        return;
    }
    
    const likeRef = db.ref(`posts/${groupId}/${postId}/likes/${currentUser.uid}`);
    const likeSnapshot = await likeRef.once('value');
    
    if (likeSnapshot.exists()) {
        await likeRef.remove();
        showToast('লাইক সরিয়ে নিলেন', 'info');
    } else {
        await likeRef.set(true);
        showToast('পোস্ট লাইক করেছেন!', 'success');
    }
}

async function addComment(groupId, postId) {
    if (!currentUser) {
        showToast('মন্তব্য করতে লগইন করুন', 'error');
        return;
    }
    
    const inputField = document.getElementById(`commentInput-${postId}`);
    const commentText = inputField.value.trim();
    if (!commentText) return;
    
    const commentRef = db.ref(`posts/${groupId}/${postId}/comments`).push();
    await commentRef.set({
        userId: currentUser.uid,
        userName: currentUser.name,
        text: commentText,
        createdAt: Date.now()
    });
    
    inputField.value = '';
    showToast('মন্তব্য যোগ হয়েছে', 'success');
}

function toggleComments(postId) {
    const commentSec = document.getElementById(`comments-${postId}`);
    if (commentSec.style.display === 'none') {
        commentSec.style.display = 'block';
    } else {
        commentSec.style.display = 'none';
    }
}

// ========== Utility Functions ==========
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function formatDate(timestamp) {
    if (!timestamp) return 'এখনই';
    const date = new Date(timestamp);
    const now = new Date();
    const diff = Math.floor((now - date) / 1000);
    if (diff < 60) return `${diff} সেকেন্ড আগে`;
    if (diff < 3600) return `${Math.floor(diff / 60)} মিনিট আগে`;
    if (diff < 86400) return `${Math.floor(diff / 3600)} ঘন্টা আগে`;
    if (diff < 2592000) return `${Math.floor(diff / 86400)} দিন আগে`;
    return date.toLocaleDateString('bn-BD');
}

function showToast(msg, type = 'info') {
    const toast = document.createElement('div');
    toast.className = 'toast';
    const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
    toast.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function openCreateModal() {
    if (!currentUser) {
        showToast('গ্রুপ তৈরি করতে লগইন করুন', 'error');
        showAuthModal();
        return;
    }
    document.getElementById('createGroupModal').style.display = 'flex';
}

function closeCreateModal() {
    document.getElementById('createGroupModal').style.display = 'none';
    document.getElementById('groupName').value = '';
    document.getElementById('groupDesc').value = '';
    document.getElementById('groupIcon').value = '👥';
}

function closeDetailOverlay() {
    document.getElementById('groupDetailOverlay').style.display = 'none';
    if (currentGroupId) {
        db.ref(`posts/${currentGroupId}`).off();
        currentGroupId = null;
    }
}

// ========== Event Listeners ==========
document.getElementById('openCreateGroupBtn').addEventListener('click', openCreateModal);
document.getElementById('closeModal').addEventListener('click', closeCreateModal);
document.getElementById('confirmCreateGroup').addEventListener('click', createGroup);
document.getElementById('closeDetailBtn').addEventListener('click', closeDetailOverlay);
document.getElementById('submitPostBtn').addEventListener('click', createPost);
document.getElementById('closeAuthModal').addEventListener('click', closeAuthModal);

document.getElementById('groupDetailOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('groupDetailOverlay')) closeDetailOverlay();
});
document.getElementById('createGroupModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('createGroupModal')) closeCreateModal();
});
document.getElementById('authModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('authModal')) closeAuthModal();
});

// Make functions global for onclick
window.showAuthModal = showAuthModal;
window.login = login;
window.signup = signup;
window.logout = logout;
window.toggleLike = toggleLike;
window.addComment = addComment;
window.toggleComments = toggleComments;
</script>
